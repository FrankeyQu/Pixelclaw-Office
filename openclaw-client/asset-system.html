<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelclaw Office 点阵资产系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #0a0a14;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .system-container {
            display: flex;
            height: 100vh;
        }

        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(90deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .nav-logo {
            font-size: 20px;
            font-weight: bold;
            color: #e94560;
            margin-right: 30px;
        }

        .nav-tabs {
            display: flex;
            gap: 5px;
        }

        .nav-tab {
            padding: 8px 20px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .nav-tab:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-tab.active {
            color: #fff;
            background: #e94560;
        }

        .nav-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .nav-btn.home-btn {
            background: #42a5f5;
            border-color: #42a5f5;
        }

        .nav-btn.home-btn:hover {
            background: #1976d2;
        }

        .nav-btn {
            padding: 8px 16px;
            background: #2a2a40;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: #3a3a50;
        }

        .nav-btn.primary {
            background: #e94560;
            border-color: #e94560;
        }

        .nav-btn.primary:hover {
            background: #c73e54;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-top: 50px;
            display: flex;
            overflow: hidden;
        }

        /* 左侧面板 */
        .left-panel {
            width: 300px;
            background: #151520;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-section {
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        .panel-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* 上传区域 */
        .upload-zone {
            border: 2px dashed #444;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-zone:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.05);
        }

        .upload-zone.dragover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .upload-text {
            font-size: 13px;
            color: #888;
        }

        .upload-hint {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
        }

        /* 资产库 */
        .asset-library {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .asset-category {
            margin-bottom: 15px;
        }

        .asset-category-title {
            font-size: 11px;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .asset-item {
            aspect-ratio: 1;
            background: #1e1e2d;
            border: 2px solid transparent;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .asset-item:hover {
            border-color: #e94560;
            background: #252538;
        }

        .asset-item.selected {
            border-color: #e94560;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
        }

        .asset-item img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .asset-item .asset-name {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90%;
        }

        /* 中间工作区 */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f18;
        }

        .workspace-toolbar {
            height: 45px;
            background: #1a1a25;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
        }

        .tool-group {
            display: flex;
            gap: 5px;
            padding-right: 10px;
            border-right: 1px solid #333;
        }

        .tool-group:last-child {
            border-right: none;
        }

        .tool-btn {
            padding: 6px 12px;
            background: #252538;
            border: 1px solid #444;
            color: #888;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .tool-btn:hover {
            background: #3a3a50;
            color: #fff;
        }

        .tool-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: auto;
            position: relative;
        }

        #mainCanvas {
            background: #1e1e2d;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
        }

        .canvas-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            color: #888;
        }

        /* 右侧面板 */
        .right-panel {
            width: 320px;
            background: #151520;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 转换参数 */
        .param-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .param-label {
            width: 100px;
            font-size: 12px;
            color: #aaa;
        }

        .param-value {
            flex: 1;
        }

        .param-value input,
        .param-value select {
            width: 100%;
            padding: 8px;
            background: #1e1e2d;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
        }

        .param-value input[type="range"] {
            padding: 0;
        }

        .param-hint {
            font-size: 10px;
            color: #666;
            margin-top: 3px;
        }

        /* 调色板 */
        .palette-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            margin-top: 10px;
        }

        .palette-color {
            aspect-ratio: 1;
            border-radius: 3px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .palette-color:hover {
            transform: scale(1.1);
        }

        .palette-color.selected {
            border-color: #fff;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        /* 预览对比 */
        .preview-comparison {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .preview-box {
            flex: 1;
            aspect-ratio: 1;
            background: #1e1e2d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-box img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .preview-label {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }

        /* 动画帧 */
        .frame-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .frame-item {
            width: 60px;
            height: 60px;
            background: #1e1e2d;
            border: 2px solid transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .frame-item:hover {
            border-color: #444;
        }

        .frame-item.selected {
            border-color: #e94560;
        }

        .frame-item img {
            max-width: 80%;
            max-height: 80%;
            image-rendering: pixelated;
        }

        /* 按钮 */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: #2a2a40;
            color: #fff;
            border: 1px solid #444;
        }

        .btn-secondary:hover {
            background: #3a3a50;
        }

        .btn-full {
            width: 100%;
            margin-top: 10px;
        }

        /* 隐藏的文件上传 */
        #fileUpload {
            display: none;
        }

        /* 进度条 */
        .progress-container {
            margin-top: 15px;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 6px;
            background: #2a2a40;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #c73e54);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            text-align: center;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a14;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #2a2a40;
            border-radius: 10px;
            font-size: 10px;
            color: #888;
        }

        .status-badge.ready {
            background: #00d9a320;
            color: #00d9a3;
        }

        .status-badge.converting {
            background: #ffa72620;
            color: #ffa726;
        }
    </style>
</head>
<body>
    <div class="system-container">
        <!-- 顶部导航 -->
        <div class="top-nav">
            <div class="nav-logo">🔴 Pixelclaw Office 点阵资产系统</div>
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="system.switchTab('convert')">转换</button>
                <button class="nav-tab" onclick="system.switchTab('edit')">像素编辑</button>
                <button class="nav-tab" onclick="system.switchTab('animate')">动画</button>
                <button class="nav-tab" onclick="system.switchTab('library')">资产库</button>
            </div>
            <div class="nav-actions">
                <a href="index.html" class="nav-btn home-btn" style="text-decoration: none;">🏠 返回主页</a>
                <a href="editor.html" class="nav-btn" style="text-decoration: none; background: #42a5f5; border-color: #42a5f5;">🗺️ 地图编辑器</a>
                <button class="nav-btn" onclick="system.showAIGenerator()">🤖 AI生成</button>
                <button class="nav-btn" onclick="system.exportDotMatrix()">📄 导出点阵</button>
                <button class="nav-btn" onclick="system.exportToMapEditor()">🖼️ 导出到地图编辑器</button>
                <button class="nav-btn" onclick="system.exportProject()">导出项目</button>
                <button class="nav-btn primary" onclick="system.saveToLibrary()">保存到库</button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧面板 -->
            <div class="left-panel">
                <!-- 上传区域 -->
                <div class="panel-section">
                    <div class="panel-title">📤 导入</div>
                    <div class="upload-zone" id="uploadZone" onclick="system.showUploadDialog()">
                        <div class="upload-icon">📁</div>
                        <div class="upload-text">拖放图片或点击上传</div>
                        <div class="upload-hint">支持 PNG, JPG, GIF</div>
                    </div>
                    <input type="file" id="fileUpload" accept="image/*" onchange="system.handleFileUpload(event)">
                    
                    <!-- 进度条 -->
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                        </div>
                        <div class="progress-text" id="progressText">准备转换...</div>
                    </div>
                </div>

                <!-- 资产库 -->
                <div class="asset-library" id="assetLibrary">
                    <div class="panel-title">📦 资产库</div>
                    <div id="libraryContent">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 中间工作区 -->
            <div class="workspace">
                <div class="workspace-toolbar">
                    <div class="tool-group">
                        <button class="tool-btn active" id="tool-pencil" onclick="system.setTool('pencil')">✏️ 铅笔</button>
                        <button class="tool-btn" id="tool-eraser" onclick="system.setTool('eraser')">🧹 橡皮</button>
                        <button class="tool-btn" id="tool-picker" onclick="system.setTool('picker')">💧 取色</button>
                        <button class="tool-btn" id="tool-fill" onclick="system.setTool('fill')">🪣 填充</button>
                        <button class="tool-btn" id="tool-grid" onclick="system.setTool('grid')">⬜ 格子笔</button>
                    </div>
                    <div class="tool-group">
                        <button class="tool-btn" onclick="system.undo()">↩️ 撤销</button>
                        <button class="tool-btn" onclick="system.redo()">↪️ 重做</button>
                    </div>
                    <div class="tool-group">
                        <button class="tool-btn" onclick="system.zoomOut()">🔍-</button>
                        <button class="tool-btn" onclick="system.resetZoom()">100%</button>
                        <button class="tool-btn" onclick="system.zoomIn()">🔍+</button>
                    </div>
                    <div class="tool-group">
                        <button class="tool-btn" onclick="system.clearCanvas()">🗑️ 清除画布</button>
                    </div>
                </div>
                <div class="canvas-container">
                    <canvas id="mainCanvas" width="512" height="512"></canvas>
                    <div class="canvas-info" id="canvasInfo">
                        512 x 512 px | 缩放: 100% | 位置: 0, 0
                    </div>
                </div>
            </div>

            <!-- 右侧面板 -->
            <div class="right-panel">
                <!-- 转换参数 -->
                <div class="panel-section">
                    <div class="panel-title">⚙️ 转换参数</div>
                    
                    <div class="param-row">
                        <span class="param-label">格子数量</span>
                        <div class="param-value">
                            <select id="gridCells" onchange="system.updateConvertParams()">
                                <option value="1">1 x 1 格</option>
                                <option value="2">2 x 2 格</option>
                                <option value="3">3 x 3 格</option>
                                <option value="4">4 x 4 格</option>
                                <option value="5" selected>5 x 5 格</option>
                                <option value="6">6 x 6 格</option>
                                <option value="8">8 x 8 格</option>
                                <option value="10">10 x 10 格</option>
                                <option value="12">12 x 12 格</option>
                                <option value="16">16 x 16 格</option>
                                <option value="20">20 x 20 格</option>
                            </select>
                        </div>
                    </div>

                    <div class="param-row">
                        <span class="param-label">每格像素</span>
                        <div class="param-value">
                            <select id="pixelsPerCell" onchange="system.updateConvertParams()">
                                <option value="8">8 px</option>
                                <option value="16">16 px</option>
                                <option value="20" selected>20 px</option>
                                <option value="32">32 px</option>
                                <option value="64">64 px</option>
                            </select>
                            <div class="param-hint">最终尺寸: <span id="finalSize">100 x 100</span> px</div>
                        </div>
                    </div>

                    <div class="param-row">
                        <span class="param-label">颜色数量</span>
                        <div class="param-value">
                            <input type="range" id="colorCount" min="4" max="32" value="16" 
                                onchange="system.updateConvertParams()">
                            <div class="param-hint">当前: <span id="colorCountValue">16</span> 色</div>
                        </div>
                    </div>

                    <div class="param-row">
                        <span class="param-label">量化算法</span>
                        <div class="param-value">
                            <select id="quantMethod" onchange="system.updateConvertParams()">
                                <option value="median">中位切分</option>
                                <option value="kmeans">K-Means</option>
                                <option value="octree">八叉树</option>
                            </select>
                        </div>
                    </div>

                    <div class="param-row">
                        <span class="param-label">抖动算法</span>
                        <div class="param-value">
                            <select id="ditherMethod" onchange="system.updateConvertParams()">
                                <option value="none">无</option>
                                <option value="bayer" selected>Bayer</option>
                                <option value="floyd">Floyd-Steinberg</option>
                            </select>
                        </div>
                    </div>

                    <div class="param-row">
                        <span class="param-label">转换方式</span>
                        <div class="param-value">
                            <select id="convertMethod" onchange="system.updateConvertParams()">
                                <option value="traditional" selected>传统转换</option>
                                <option value="ai">AI转换</option>
                            </select>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-full" onclick="system.convertImage()">
                        🚀 开始转换
                    </button>
                </div>

                <!-- 调色板 -->
                <div class="panel-section">
                    <div class="panel-title">🎨 调色板</div>
                    <div class="palette-container" id="paletteContainer">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 预览对比 -->
                <div class="panel-section">
                    <div class="panel-title">👁️ 预览对比</div>
                    <div class="preview-comparison">
                        <div>
                            <div class="preview-box" id="previewOriginal">
                                <span style="color: #666; font-size: 12px;">原图</span>
                            </div>
                            <div class="preview-label">原始</div>
                        </div>
                        <div>
                            <div class="preview-box" id="previewConverted">
                                <span style="color: #666; font-size: 12px;">转换后</span>
                            </div>
                            <div class="preview-label">点阵</div>
                        </div>
                    </div>
                </div>

                <!-- 动画帧 -->
                <div class="panel-section">
                    <div class="panel-title">🎬 动画帧</div>
                    <div class="frame-list" id="frameList">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="asset-system.js"></script>
    
    <!-- AI生成对话框 -->
    <div id="aiGeneratorDialog" style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 4000;
    ">
        <div style="
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        ">
            <h2 style="
                color: #e94560;
                margin-bottom: 20px;
                font-size: 18px;
                text-align: center;
            ">🤖 AI生成图案</h2>
            <p style="
                color: #aaa;
                margin-bottom: 20px;
                font-size: 14px;
                text-align: center;
            ">选择要生成的图案类型</p>
            <div style="
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                margin-bottom: 20px;
            ">
                <button onclick="system.selectAIPattern('noise')" style="
                    padding: 12px;
                    background: #2a2a40;
                    border: 1px solid #444;
                    border-radius: 6px;
                    color: #fff;
                    cursor: pointer;
                    font-size: 13px;
                    transition: all 0.3s;
                ">🌫️ 噪点</button>
                <button onclick="system.selectAIPattern('gradient')" style="
                    padding: 12px;
                    background: #2a2a40;
                    border: 1px solid #444;
                    border-radius: 6px;
                    color: #fff;
                    cursor: pointer;
                    font-size: 13px;
                    transition: all 0.3s;
                ">🌈 渐变</button>
                <button onclick="system.selectAIPattern('checkerboard')" style="
                    padding: 12px;
                    background: #2a2a40;
                    border: 1px solid #444;
                    border-radius: 6px;
                    color: #fff;
                    cursor: pointer;
                    font-size: 13px;
                    transition: all 0.3s;
                ">⬛ 棋盘</button>
                <button onclick="system.selectAIPattern('circles')" style="
                    padding: 12px;
                    background: #2a2a40;
                    border: 1px solid #444;
                    border-radius: 6px;
                    color: #fff;
                    cursor: pointer;
                    font-size: 13px;
                    transition: all 0.3s;
                ">⭕ 圆形</button>
                <button onclick="system.selectAIPattern('stripes')" style="
                    padding: 12px;
                    background: #2a2a40;
                    border: 1px solid #444;
                    border-radius: 6px;
                    color: #fff;
                    cursor: pointer;
                    font-size: 13px;
                    transition: all 0.3s;
                ">📊 条纹</button>
                <button onclick="system.selectAIPattern('random')" style="
                    padding: 12px;
                    background: #e94560;
                    border: 1px solid #e94560;
                    border-radius: 6px;
                    color: #fff;
                    cursor: pointer;
                    font-size: 13px;
                    transition: all 0.3s;
                ">🎲 随机</button>
            </div>
            
            <!-- 高级自定义生成 -->
            <div style="
                margin-bottom: 20px;
                padding: 15px;
                background: #1e1e32;
                border: 1px solid #444;
                border-radius: 8px;
            ">
                <p style="
                    color: #aaa;
                    margin-bottom: 12px;
                    font-size: 13px;
                ">高级自定义生成</p>
                
                <div style="
                    margin-bottom: 10px;
                ">
                    <label style="
                        display: block;
                        color: #888;
                        margin-bottom: 5px;
                        font-size: 12px;
                    ">图案描述</label>
                    <input type="text" id="patternDescription" placeholder="输入图案描述（如：房子、树、人物等）" style="
                        width: 100%;
                        padding: 10px;
                        background: #2a2a40;
                        border: 1px solid #444;
                        border-radius: 6px;
                        color: #fff;
                        font-size: 13px;
                    ">
                </div>
                
                <div style="
                    margin-bottom: 10px;
                ">
                    <label style="
                        display: block;
                        color: #888;
                        margin-bottom: 5px;
                        font-size: 12px;
                    ">尺寸 (宽*高)</label>
                    <input type="text" id="patternSize" placeholder="输入尺寸（如：5*5、8*8等）" style="
                        width: 100%;
                        padding: 10px;
                        background: #2a2a40;
                        border: 1px solid #444;
                        border-radius: 6px;
                        color: #fff;
                        font-size: 13px;
                    ">
                </div>
                
                <button onclick="system.generateCustomPattern()" style="
                    width: 100%;
                    padding: 10px;
                    background: #42a5f5;
                    border: 1px solid #42a5f5;
                    border-radius: 6px;
                    color: #fff;
                    cursor: pointer;
                    font-size: 13px;
                    transition: all 0.3s;
                ">生成图案</button>
                
                <p style="
                    color: #666;
                    margin-top: 8px;
                    font-size: 11px;
                ">示例: 输入"房子"和"5*5"，生成5x5格的房子图案</p>
            </div>
            <button onclick="system.closeAIDialog()" style="
                width: 100%;
                padding: 10px;
                background: #444;
                border: none;
                border-radius: 6px;
                color: #fff;
                cursor: pointer;
                font-size: 13px;
                transition: all 0.3s;
            ">取消</button>
        </div>
    </div>
</body>
</html>
