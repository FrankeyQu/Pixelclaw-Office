<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的资产 - Pixelclaw Office</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 24px;
        }
        .page {
            max-width: 560px;
            margin: 0 auto;
        }
        .page-header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e94560;
        }
        .page-header h1 { font-size: 22px; color: #e94560; }
        .page-header p { font-size: 12px; color: #888; margin-top: 8px; }

        .control-group { margin-bottom: 24px; }
        .control-group h3 {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .stat-value { font-size: 18px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

        .btn {
            display: block;
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-decoration: none;
            text-align: center;
        }
        .btn-primary { background: linear-gradient(135deg, #e94560, #c73e54); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }

        /* 元素预览网格 */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .asset-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .asset-card.unlocked {
            border-color: #d4af37;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
        }
        .asset-card .asset-preview {
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #666;
        }
        .asset-card.unlocked .asset-preview { color: #d4af37; }
        .asset-card .asset-name { font-size: 13px; color: #fff; }
        .asset-card .asset-status { font-size: 11px; margin-top: 4px; }
        .asset-card.unlocked .asset-status { color: #d4af37; }
        .asset-card:not(.unlocked) .asset-status { color: #666; }

        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
            z-index: 9999;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-header">
            <h1>我的资产</h1>
            <p>本项目开源免费，多数元素可直接使用。以下为付费元素，可通过兑换码解锁。</p>
        </div>

        <!-- 资产总览 -->
        <div class="control-group">
            <h3>资产总览</h3>
            <div id="overviewEmpty" class="stat-card" style="display:none;">
                <div class="stat-value">未激活</div>
                <div class="stat-label">使用兑换码解锁付费元素</div>
            </div>
            <div id="overviewActive" style="display:none;">
                <div class="stat-card">
                    <div class="stat-value" id="overviewProducts">--</div>
                    <div class="stat-label">已解锁元素</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="overviewExpiry">--</div>
                    <div class="stat-label">授权期限</div>
                </div>
                <button type="button" class="btn btn-secondary" style="margin-top:8px;" onclick="MyAssets.clearLicense()">解除激活</button>
            </div>
        </div>

        <!-- 兑换码兑换 -->
        <div class="control-group">
            <h3>兑换码兑换</h3>
            <textarea id="redeemInput" placeholder="粘贴兑换码（PXO- 开头）" rows="3"
                style="width:100%;padding:10px;font-size:13px;background:#2a2a40;border:1px solid #444;border-radius:8px;color:#fff;resize:vertical;font-family:monospace;margin-bottom:10px;"></textarea>
            <button type="button" class="btn btn-primary" onclick="MyAssets.redeem()">兑换</button>
        </div>

        <!-- 新元素预览 -->
        <div class="control-group">
            <h3>付费元素预览</h3>
            <div id="assetGrid" class="asset-grid">
                <!-- 由 JS 动态填充 -->
            </div>
        </div>

        <!-- 返回 -->
        <div class="control-group">
            <a href="index.html" class="btn btn-secondary">返回主页面</a>
        </div>
    </div>

    <div id="toast"></div>

    <script src="license.js"></script>
    <script src="my-assets.js"></script>
</body>
</html>
