<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelclaw Office 地图/资产编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .editor-container {
            display: flex;
            height: 100vh;
        }

        /* 左侧面板：模板 + 元素库 */
        .left-panel {
            width: 280px;
            background: #252538;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .template-panel {
            flex-shrink: 0;
            border-bottom: 1px solid #333;
        }

        .template-header {
            padding: 12px 15px;
            background: #1e1e32;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .template-header h2 {
            font-size: 16px;
            color: #e94560;
            margin: 0;
        }

        .template-save-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, #00d9a3, #00b386);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .template-save-btn:hover {
            box-shadow: 0 3px 12px rgba(0, 217, 163, 0.4);
        }

        .template-list {
            max-height: 160px;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .template-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #2a2a40;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: grab;
            transition: all 0.2s;
        }

        .template-item:hover {
            border-color: #e94560;
            background: #323250;
        }

        .template-item.dragging {
            opacity: 0.6;
            cursor: grabbing;
        }

        .template-item-icon {
            font-size: 24px;
            width: 36px;
            text-align: center;
        }

        .template-item-info {
            flex: 1;
            min-width: 0;
        }

        .template-item-name {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
        }

        .template-item-count {
            font-size: 11px;
            color: #888;
        }

        .template-item-actions {
            display: flex;
            gap: 4px;
        }

        .template-item-btn {
            padding: 4px 8px;
            background: #3a3a50;
            border: none;
            border-radius: 4px;
            color: #aaa;
            font-size: 11px;
            cursor: pointer;
        }

        .template-item-btn:hover {
            background: #e94560;
            color: #fff;
        }

        .asset-library {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .library-header {
            padding: 15px;
            background: #1e1e32;
            border-bottom: 1px solid #333;
        }

        .library-header h2 {
            font-size: 16px;
            color: #e94560;
            margin-bottom: 10px;
        }

        .upload-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .asset-categories {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .category {
            margin-bottom: 15px;
        }

        .category-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .asset-item {
            aspect-ratio: 1;
            background: #2a2a40;
            border: 2px solid transparent;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .asset-item:hover {
            border-color: #e94560;
            background: #323250;
        }

        .asset-item.dragging {
            cursor: grabbing;
            opacity: 0.5;
        }

        .asset-item img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            pointer-events: none;
        }

        .asset-item .asset-name {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90%;
        }

        /* 中间画布区域 */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
        }

        .toolbar {
            min-height: 48px;
            background: #252538;
            border-bottom: 1px solid #333;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            padding: 8px 15px;
            gap: 8px;
        }
        .toolbar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-right: 8px;
            border-right: 1px solid #444;
        }
        .toolbar-group:last-child {
            border-right: none;
            padding-right: 0;
        }

        .tool-btn {
            padding: 8px 16px;
            background: #2a2a40;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .tool-btn:hover {
            background: #3a3a50;
        }

        .tool-btn.active {
            background: #e94560;
            border-color: #e94560;
        }

        .key-hint {
            display: inline-block;
            margin-left: 4px;
            padding: 1px 5px;
            font-size: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            color: #aaa;
        }

        .tool-select {
            padding: 8px 12px;
            background: #2a2a40;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .tool-select:hover {
            background: #3a3a50;
        }

        .tool-select:focus {
            outline: none;
            border-color: #e94560;
        }

        .tool-separator {
            width: 1px;
            height: 24px;
            background: #444;
            margin: 0 5px;
        }

        .canvas-wrapper {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        #editorCanvas {
            background: #2d2d44;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
        }

        .canvas-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #888;
        }

        /* 右侧属性面板 */
        .properties-panel {
            width: 320px;
            background: #252538;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 15px;
            background: #1e1e32;
            border-bottom: 1px solid #333;
        }

        .panel-header h2 {
            font-size: 16px;
            color: #e94560;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .property-group {
            margin-bottom: 20px;
        }

        .property-group h3 {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .property-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .property-label {
            width: 100px;
            font-size: 13px;
            color: #aaa;
        }

        .property-value {
            flex: 1;
        }

        .property-value input,
        .property-value select {
            width: 100%;
            padding: 8px 10px;
            background: #1e1e32;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
        }

        .property-value input:focus,
        .property-value select:focus {
            outline: none;
            border-color: #e94560;
        }

        .property-value input[type="checkbox"] {
            width: auto;
            transform: scale(1.2);
        }

        .property-value input[type="number"] {
            width: 70px;
        }

        .coordinate-inputs {
            display: flex;
            gap: 10px;
        }

        .coordinate-inputs input {
            width: 60px;
        }

        /* 碰撞边界编辑器 */
        .collision-editor {
            background: #1e1e32;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .collision-editor h4 {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .collision-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin-bottom: 10px;
        }

        .collision-cell {
            aspect-ratio: 1;
            background: #2a2a40;
            border: 1px solid #444;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .collision-cell:hover {
            background: #3a3a50;
        }

        .collision-cell.active {
            background: #e94560;
            border-color: #e94560;
        }

        .collision-cell.center {
            background: #42a5f5;
            border-color: #42a5f5;
        }

        .collision-legend {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: #888;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        /* 按钮 */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: #2a2a40;
            color: #fff;
            border: 1px solid #444;
        }

        .btn-secondary:hover {
            background: #3a3a50;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-group .btn {
            flex: 1;
        }

        /* 隐藏的文件上传 */
        #fileUpload {
            display: none;
        }

        /* 提示信息 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 网格开关 */
        .grid-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .grid-toggle span {
            font-size: 12px;
            color: #888;
        }

        .toggle-switch {
            width: 40px;
            height: 20px;
            background: #444;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #e94560;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-switch.active::after {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- 左侧：模板 + 元素库 -->
        <div class="left-panel">
            <!-- 模板区 -->
            <div class="template-panel">
                <div class="template-header">
                    <h2>📂 模板</h2>
                    <button class="template-save-btn" onclick="editor.saveAsTemplate()" title="将当前画布保存为模板">+ 保存为模板</button>
                </div>
                <div class="template-list" id="templateList">
                    <!-- 动态生成 -->
                </div>
            </div>
            <!-- 元素库 -->
            <div class="asset-library">
            <div class="library-header">
                <h2>📦 元素库</h2>
                <button class="upload-btn" onclick="editor.showUploadDialog()" style="margin-bottom:6px;">+ 上传图片</button>
                <button class="upload-btn" onclick="editor.showAIGenerator()" style="background:linear-gradient(135deg,#42a5f5,#1976d2);margin-bottom:6px;">🤖 AI生成</button>
                <input type="file" id="fileUpload" accept="image/*" multiple onchange="editor.handleFileUpload(event)">
            </div>
            <div class="asset-categories" id="assetCategories">
                <!-- 动态生成 -->
            </div>
            </div>
        </div>

        <!-- 中间画布区域 -->
        <div class="canvas-area">
            <div class="toolbar">
                <div class="toolbar-group">
                    <a href="index.html" class="tool-btn" style="text-decoration: none; background: #42a5f5; border-color: #42a5f5;">🏠 返回</a>
                    <button class="tool-btn" onclick="editor.applyAsCurrentMap()" style="background: linear-gradient(135deg, #00d9a3, #00b386); border-color: #00b386;" title="将当前地图设为办公室使用的地图">✓ 应用为当前地图</button>
                </div>
                <div class="toolbar-group">
                    <button class="tool-btn" id="btn-undo" onclick="editor.undo()" title="撤销 Ctrl+Z">↶ 上一步</button>
                    <button class="tool-btn" id="btn-redo" onclick="editor.redo()" title="重做 Ctrl+Y">↷ 下一步</button>
                </div>
                <div class="toolbar-group">
                    <button class="tool-btn active" onclick="editor.setTool('select')" id="tool-select">选择</button>
                    <button class="tool-btn" onclick="editor.setTool('move')" id="tool-move">移动</button>
                    <button class="tool-btn" onclick="editor.setTool('collision')" id="tool-collision" title="碰撞编辑 Ctrl">碰撞<span class="key-hint">Ctrl</span></button>
                    <button class="tool-btn" onclick="editor.setTool('label')" id="tool-label" title="区域标签（会议室、研发区等）">🏷 标签</button>
                    <button class="tool-btn" onclick="editor.setTool('erase')" id="tool-erase" title="橡皮擦 C">橡皮擦<span class="key-hint">C</span></button>
                </div>
                <div class="toolbar-group">
                    <button class="tool-btn" onclick="editor.setTool('grid')" id="tool-grid">格子笔</button>
                    <button class="tool-btn" onclick="editor.setTool('gridEraser')" id="tool-gridEraser">格子橡皮</button>
                    <button class="tool-btn" onclick="editor.setTool('picker')" id="tool-picker">取色</button>
                    <button class="tool-btn" onclick="editor.setTool('fill')" id="tool-fill">填充</button>
                </div>
                <div class="toolbar-group">
                    <button class="tool-btn" onclick="editor.startCropMode()" id="tool-crop" title="裁剪选中元素的图片，蓝色虚线框调整范围">裁剪</button>
                </div>
                <div class="toolbar-group">
                    <button class="tool-btn" onclick="editor.clearMap()">清空地图</button>
                    <button class="tool-btn" onclick="editor.clearDrawLayer()" title="清空绘制层">清空绘制</button>
                </div>
                <div class="toolbar-group">
                    <button class="tool-btn" onclick="editor.exportMap()">导出</button>
                    <button class="tool-btn" onclick="editor.showCanvasSettings()">画布设置</button>
                </div>
                <div class="toolbar-group">
                    <div class="grid-toggle" style="display:flex;align-items:center;gap:8px;">
                        <span style="font-size:12px;color:#aaa;">网格</span>
                        <div class="toggle-switch active" onclick="editor.toggleGrid()" id="gridToggle"></div>
                    </div>
                </div>
            </div>
            <div class="palette-row" id="paletteRow" style="display:flex;gap:4px;padding:6px 12px;background:#252538;border-bottom:1px solid #333;flex-wrap:wrap;align-items:center;">
                <span style="font-size:12px;color:#aaa;margin-right:8px;">绘制颜色:</span>
                <div id="paletteStrip" style="display:flex;gap:2px;flex-wrap:wrap;"></div>
            </div>
            <div class="canvas-wrapper" style="position:relative;">
                <canvas id="editorCanvas"></canvas>
                <canvas id="cropOverlay" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;display:none;"></canvas>
                <div class="canvas-info">
                    <span id="canvasInfo">1000 x 750 px | 网格: 20px</span>
                </div>
                <div id="cropHint" style="display:none;position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.8);padding:8px 12px;border-radius:6px;font-size:12px;color:#aaa;">
                    拖拽控制点调整 | Enter 确认 | Esc 取消
                </div>
                <button id="cropConfirmBtn" onclick="editor.confirmCrop()" style="display:none;position:absolute;top:10px;right:10px;padding:8px 16px;background:linear-gradient(135deg,#00d9a3,#00b386);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;box-shadow:0 3px 10px rgba(0,217,163,0.4);">
                    ✓ 确认裁剪
                </button>
            </div>
        </div>

        <!-- 右侧属性面板 -->
        <div class="properties-panel">
            <div class="panel-header">
                <h2>⚙️ 属性设置</h2>
            </div>
            <div class="panel-content" id="propertiesContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div>选择一个元素以编辑属性</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 裁剪确认弹窗 -->
    <div id="cropConfirmDialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:3000;">
        <div style="background:#1a1a2e;border:1px solid #333;border-radius:12px;padding:24px;min-width:260px;">
            <h3 style="color:#42a5f5;margin-bottom:16px;">✂️ 裁剪完成</h3>
            <p style="color:#aaa;font-size:13px;margin-bottom:16px;">如何保存裁剪后的图片？</p>
            <div style="display:flex;gap:10px;">
                <button class="tool-btn" onclick="editor.applyCrop(true)" style="flex:1;">覆盖原图</button>
                <button class="tool-btn" onclick="editor.applyCrop(false)" style="flex:1;background:linear-gradient(135deg,#00d9a3,#00b386);">另存为新</button>
                <button class="tool-btn" onclick="editor.cancelCrop()">取消</button>
            </div>
        </div>
    </div>

    <!-- AI生成弹窗 -->
    <div id="aiDialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:3000;flex-direction:column;">
        <div style="background:#1a1a2e;border:1px solid #333;border-radius:12px;padding:24px;min-width:280px;">
            <h3 style="color:#e94560;margin-bottom:16px;">🤖 AI生成图案</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <button class="tool-btn" onclick="editor.addAIPattern('house')">🏠 房子</button>
                <button class="tool-btn" onclick="editor.addAIPattern('desk')">🪑 办公桌</button>
                <button class="tool-btn" onclick="editor.addAIPattern('plant')">🪴 盆栽</button>
                <button class="tool-btn" onclick="editor.addAIPattern('animal')">🐱 小动物</button>
            </div>
            <button class="tool-btn" onclick="editor.closeAIDialog()" style="margin-top:16px;width:100%;">取消</button>
        </div>
    </div>
    <script src="ai-patterns.js"></script>
    <script src="map-editor.js"></script>
</body>
</html>
