<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelclaw Office 地图编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .editor-container {
            display: flex;
            height: 100vh;
        }

        /* 左侧元素库 */
        .asset-library {
            width: 280px;
            background: #252538;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .library-header {
            padding: 15px;
            background: #1e1e32;
            border-bottom: 1px solid #333;
        }

        .library-header h2 {
            font-size: 16px;
            color: #e94560;
            margin-bottom: 10px;
        }

        .upload-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .asset-categories {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .category {
            margin-bottom: 15px;
        }

        .category-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .asset-item {
            aspect-ratio: 1;
            background: #2a2a40;
            border: 2px solid transparent;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .asset-item:hover {
            border-color: #e94560;
            background: #323250;
        }

        .asset-item.dragging {
            cursor: grabbing;
            opacity: 0.5;
        }

        .asset-item img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            pointer-events: none;
        }

        .asset-item .asset-name {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90%;
        }

        /* 中间画布区域 */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
        }

        .toolbar {
            height: 50px;
            background: #252538;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
        }

        .tool-btn {
            padding: 8px 16px;
            background: #2a2a40;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .tool-btn:hover {
            background: #3a3a50;
        }

        .tool-btn.active {
            background: #e94560;
            border-color: #e94560;
        }

        .tool-separator {
            width: 1px;
            height: 24px;
            background: #444;
            margin: 0 5px;
        }

        .canvas-wrapper {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        #editorCanvas {
            background: #2d2d44;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
        }

        .canvas-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #888;
        }

        /* 右侧属性面板 */
        .properties-panel {
            width: 320px;
            background: #252538;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 15px;
            background: #1e1e32;
            border-bottom: 1px solid #333;
        }

        .panel-header h2 {
            font-size: 16px;
            color: #e94560;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .property-group {
            margin-bottom: 20px;
        }

        .property-group h3 {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .property-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .property-label {
            width: 100px;
            font-size: 13px;
            color: #aaa;
        }

        .property-value {
            flex: 1;
        }

        .property-value input,
        .property-value select {
            width: 100%;
            padding: 8px 10px;
            background: #1e1e32;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
        }

        .property-value input:focus,
        .property-value select:focus {
            outline: none;
            border-color: #e94560;
        }

        .property-value input[type="checkbox"] {
            width: auto;
            transform: scale(1.2);
        }

        .property-value input[type="number"] {
            width: 70px;
        }

        .coordinate-inputs {
            display: flex;
            gap: 10px;
        }

        .coordinate-inputs input {
            width: 60px;
        }

        /* 碰撞边界编辑器 */
        .collision-editor {
            background: #1e1e32;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .collision-editor h4 {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .collision-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin-bottom: 10px;
        }

        .collision-cell {
            aspect-ratio: 1;
            background: #2a2a40;
            border: 1px solid #444;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .collision-cell:hover {
            background: #3a3a50;
        }

        .collision-cell.active {
            background: #e94560;
            border-color: #e94560;
        }

        .collision-cell.center {
            background: #42a5f5;
            border-color: #42a5f5;
        }

        .collision-legend {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: #888;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        /* 按钮 */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: #2a2a40;
            color: #fff;
            border: 1px solid #444;
        }

        .btn-secondary:hover {
            background: #3a3a50;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-group .btn {
            flex: 1;
        }

        /* 隐藏的文件上传 */
        #fileUpload {
            display: none;
        }

        /* 提示信息 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 网格开关 */
        .grid-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .grid-toggle span {
            font-size: 12px;
            color: #888;
        }

        .toggle-switch {
            width: 40px;
            height: 20px;
            background: #444;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #e94560;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-switch.active::after {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- 左侧元素库 -->
        <div class="asset-library">
            <div class="library-header">
                <h2>📦 元素库</h2>
                <button class="upload-btn" onclick="editor.showUploadDialog()">
                    + 上传图片
                </button>
                <input type="file" id="fileUpload" accept="image/*" multiple onchange="editor.handleFileUpload(event)">
            </div>
            <div class="asset-categories" id="assetCategories">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 中间画布区域 -->
        <div class="canvas-area">
            <div class="toolbar">
                <a href="index.html" class="tool-btn" style="text-decoration: none; background: #42a5f5; border-color: #42a5f5;">🏠 返回主页</a>
                <div class="tool-separator"></div>
                <button class="tool-btn active" onclick="editor.setTool('select')" id="tool-select">选择</button>
                <button class="tool-btn" onclick="editor.setTool('move')" id="tool-move">移动</button>
                <button class="tool-btn" onclick="editor.setTool('collision')" id="tool-collision" title="在画布上点击元素内格子设置碰撞区域（碰撞仅影响元素间碰撞）">碰撞编辑</button>
                <button class="tool-btn" onclick="editor.setTool('erase')" id="tool-erase">橡皮擦</button>
                <div class="tool-separator"></div>
                <button class="tool-btn" onclick="editor.clearMap()">清空地图</button>
                <button class="tool-btn" onclick="editor.exportMap()">导出配置</button>
                <button class="tool-btn" onclick="editor.showCanvasSettings()">画布设置</button>
                <div class="grid-toggle">
                    <span>显示网格</span>
                    <div class="toggle-switch active" onclick="editor.toggleGrid()" id="gridToggle"></div>
                </div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="editorCanvas"></canvas>
                <div class="canvas-info">
                    <span id="canvasInfo">1000 x 750 px | 网格: 20px</span>
                </div>
            </div>
        </div>

        <!-- 右侧属性面板 -->
        <div class="properties-panel">
            <div class="panel-header">
                <h2>⚙️ 属性设置</h2>
            </div>
            <div class="panel-content" id="propertiesContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div>选择一个元素以编辑属性</div>
                </div>
            </div>
        </div>
    </div>

    <script src="map-editor.js"></script>
</body>
</html>
